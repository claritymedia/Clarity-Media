    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Source+Serif+4:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              primary: {
                950: '#0d261f',
                900: '#1a4d3e',
                800: '#24634f',
                700: '#2d7a5f',
                600: '#369070',
                500: '#3fa680',
                400: '#55b893',
                300: '#6bc5a0',
                200: '#89d4b6',
                100: '#a8e4cc',
                50: '#d4f2e6',
              },
              accent: {
                DEFAULT: '#ff6b35',
                hover: '#e85a25'
              },
              neutral: {
                900: '#1a1a1a',
                700: '#404040',
                500: '#737373',
                300: '#d4d4d4',
                100: '#f5f5f5',
              }
            },
            fontFamily: {
              sans: ['Outfit', 'sans-serif'],
              serif: ['"Source Serif 4"', 'serif'],
            },
            animation: {
              'fade-in': 'fadeIn 0.5s ease-out forwards',
              'slide-up': 'slideUp 0.5s ease-out forwards',
              'marquee': 'marquee 50s linear infinite',
            },
            keyframes: {
              fadeIn: {
                '0%': { opacity: '0' },
                '100%': { opacity: '1' },
              },
              slideUp: {
                '0%': { opacity: '0', transform: 'translateY(20px)' },
                '100%': { opacity: '1', transform: 'translateY(0)' },
              },
              marquee: {
                '0%': { transform: 'translateX(0)' },
                '100%': { transform: 'translateX(-50%)' },
              }
            }
          }
        }
      }
    </script>
